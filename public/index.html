<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>片单 · CC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Grain overlay -->
  <div class="grain"></div>

  <div class="app-layout">

    <!-- ════ Sidebar ════ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="cc-mark-small" aria-hidden="true">
          <svg viewBox="0 0 48 48" class="cc-svg-small">
            <circle cx="24" cy="24" r="22" fill="none" stroke="currentColor" stroke-width="2"/>
            <text x="24" y="33" text-anchor="middle" fill="currentColor" font-family="'Playfair Display', serif" font-size="26" font-weight="700">C</text>
          </svg>
        </div>
        <span class="sidebar-title">片单</span>
      </div>

      <nav class="sidebar-nav" id="listNav">
        <!-- Populated by JS -->
      </nav>

      <button class="sidebar-add-btn" id="sidebarAddBtn" aria-label="新建片单">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        新建片单
      </button>

      <div class="sidebar-footer">
        <button class="settings-btn" id="settingsBtn" title="TMDB API 设置" aria-label="TMDB API 设置">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- ════ Main Content ════ -->
    <main class="main-content">

      <!-- Header -->
      <header class="header">
        <div class="header-info">
          <h1 class="header-list-name" id="headerListName">我的片单</h1>
          <span class="header-count" id="headerCount">0 部电影</span>
        </div>

      </header>

      <!-- TMDB Search Bar -->
      <section class="tmdb-bar">
        <div class="tmdb-search-wrap" id="tmdbSearchWrap">
          <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="text" id="tmdbSearch" class="tmdb-search-input" placeholder="搜索 TMDB 添加电影…" autocomplete="off">

        </div>
        <div class="tmdb-dropdown" id="tmdbDropdown"></div>
        <p class="tmdb-hint hidden" id="tmdbHint">
          ⚠️ 尚未配置 TMDB API Key，无法搜索电影。<br>
          请<button type="button" class="link-btn" id="tmdbGoSettings">前往设置</button>配置 Key。
        </p>
      </section>

      <!-- Toolbar (in-list filters) -->
      <section class="toolbar">
        <div class="toolbar-row">
          <div class="list-search-box">
            <svg class="search-icon search-icon-sm" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="text" id="listSearch" class="list-search-input" placeholder="筛选片单…" autocomplete="off">
          </div>
          <div class="sort-group">
            <label class="sort-label">排序</label>
            <select id="sortSelect" class="sort-select">
              <option value="created_at">最近添加</option>
              <option value="title">片名</option>
              <option value="year">年份</option>
              <option value="rating">评分</option>
            </select>
          </div>
        </div>

        <div id="activeTagFilter" class="active-tag-filter hidden">
          <span class="active-tag-label">标签筛选：</span>
          <span id="activeTagName" class="active-tag-name"></span>
          <button id="clearTagFilter" class="active-tag-clear" aria-label="清除标签筛选">✕</button>
        </div>
      </section>

      <!-- Movie Grid -->
      <div class="movie-grid" id="movieGrid"></div>

      <!-- Empty State -->
      <div class="empty-state hidden" id="emptyState">
        <div class="empty-disc">
          <div class="empty-disc-inner"><div class="empty-disc-hub"></div></div>
        </div>
        <p class="empty-title">片单为空</p>
        <p class="empty-sub">在上方搜索框中搜索 TMDB，点击即可加入片单</p>
      </div>
    </main>
  </div>

  <!-- ════ Movie Modal (add/edit) ════ -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">添加电影</h2>
        <button class="modal-close" id="modalClose" aria-label="关闭">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <form id="movieForm" class="modal-form">
        <input type="hidden" id="formMovieId">

        <div class="form-group">
          <label class="form-label" for="formTitle">片名 <span class="required">*</span></label>
          <input type="text" id="formTitle" class="form-input" required placeholder="输入电影名称…">
        </div>

        <div class="form-row">
          <div class="form-group form-group-half">
            <label class="form-label" for="formYear">年份</label>
            <input type="number" id="formYear" class="form-input" placeholder="如 2001" min="1888" max="2099">
          </div>
          <div class="form-group form-group-half">
            <label class="form-label" for="formDirector">导演</label>
            <input type="text" id="formDirector" class="form-input" placeholder="导演姓名…">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group form-group-half">
            <label class="form-label" for="formStatus">状态</label>
            <select id="formStatus" class="form-input">
              <option value="watched">已看</option>
              <option value="want_to_watch">想看</option>
            </select>
          </div>
          <div class="form-group form-group-half">
            <label class="form-label" for="formRating">评分</label>
            <select id="formRating" class="form-input">
              <option value="0">未评分</option>
              <option value="1">★ 1</option>
              <option value="2">★★ 2</option>
              <option value="3">★★★ 3</option>
              <option value="4">★★★★ 4</option>
              <option value="5">★★★★★ 5</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="formTags">标签</label>
          <div class="tags-input-container">
            <input type="text" id="formTags" class="form-input tags-input" placeholder="输入后回车添加…">
          </div>
          <div class="tags-list" id="formTagsList"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="formNotes">备注</label>
          <textarea id="formNotes" class="form-textarea" rows="3" placeholder="观影笔记…"></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-cancel" id="modalCancel">取消</button>
          <button type="submit" class="btn btn-save">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ════ Movie Detail Modal ════ -->
  <div class="modal-overlay hidden" id="detailOverlay">
    <div class="detail-panel">
      <button class="detail-back-btn hidden" id="detailBack" aria-label="返回">← 返回</button>
      <button class="detail-close" id="detailClose" aria-label="关闭详情">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <div class="detail-layout">
        <!-- Banner (backdrop) -->
        <div class="detail-banner" id="detailBanner">
          <img id="detailBackdrop" class="detail-backdrop-img hidden" src="" alt="">
          <div class="detail-banner-gradient"></div>
          <div class="detail-banner-placeholder hidden" id="detailBannerPlaceholder">
            <span class="detail-no-poster-letter">C</span>
          </div>
        </div>

        <!-- Info -->
        <div class="detail-info-col">
          <h1 class="detail-title" id="detailTitle"></h1>
          <div class="detail-meta-row">
            <span class="detail-meta" id="detailYear"></span>
            <span class="detail-meta-sep">·</span>
            <span class="detail-meta" id="detailRuntime"></span>
            <span class="detail-meta-sep">·</span>
            <span class="detail-meta" id="detailGenres"></span>
          </div>

          <!-- TMDB rating -->
          <div class="detail-tmdb-rating" id="detailTmdbRating"></div>

          <!-- User data -->
          <div class="detail-user-section">
            <div class="detail-user-row" id="detailTagsRow">
              <span class="detail-user-label">标签</span>
              <span class="detail-user-tags" id="detailTags"></span>
            </div>
            <div class="detail-user-row" id="detailNotesRow">
              <span class="detail-user-label">备注</span>
              <p class="detail-user-notes" id="detailNotes"></p>
            </div>
          </div>

          <!-- Director -->
          <div class="detail-section">
            <h3 class="detail-section-title">导演</h3>
            <div class="detail-crew" id="detailDirector"></div>
          </div>

          <!-- Cast -->
          <div class="detail-section">
            <h3 class="detail-section-title">演员</h3>
            <div class="detail-cast" id="detailCast"></div>
          </div>

          <!-- Overview -->
          <div class="detail-section">
            <h3 class="detail-section-title">简介</h3>
            <p class="detail-overview" id="detailOverview"></p>
          </div>

          <!-- Actions -->
          <div class="detail-actions">
            <button class="btn detail-delete-btn" id="detailDeleteBtn">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
              删除
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ════ Settings Modal ════ -->
  <div class="modal-overlay hidden" id="settingsOverlay">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 class="modal-title">TMDB API 设置</h2>
        <button class="modal-close" id="settingsClose" aria-label="关闭设置">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="settings-body">
        <p class="settings-desc">
          输入你的 <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener">TMDB API Key</a>（v3 auth），用于实时搜索电影和自动获取海报。
          Key 仅保存在浏览器本地。
        </p>
        <div class="form-group">
          <label class="form-label" for="apiKeyInput">API Key</label>
          <input type="password" id="apiKeyInput" class="form-input" placeholder="输入 TMDB API Key…" autocomplete="off">
        </div>
        <p class="settings-status" id="settingsStatus"></p>
        <div class="modal-footer">
          <button type="button" class="btn btn-cancel" id="settingsCancel">取消</button>
          <button type="button" class="btn btn-save" id="settingsSave">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ════ List Edit Modal ════ -->
  <div class="modal-overlay hidden" id="listModalOverlay">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 class="modal-title" id="listModalTitle">新建片单</h2>
        <button class="modal-close" id="listModalClose" aria-label="关闭片单编辑">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <form id="listForm" class="modal-form">
        <input type="hidden" id="listFormId">
        <div class="form-group">
          <label class="form-label" for="listFormName">片单名称 <span class="required">*</span></label>
          <input type="text" id="listFormName" class="form-input" required placeholder="如：CC 经典、2024 必看…">
        </div>
        <div class="form-group">
          <label class="form-label" for="listFormDesc">描述（可选）</label>
          <input type="text" id="listFormDesc" class="form-input" placeholder="简短描述…">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-cancel" id="listModalCancel">取消</button>
          <button type="submit" class="btn btn-save">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ════ Toast ════ -->
  <div class="toast hidden" id="toast"></div>

  <!-- ════ Delete Confirm Dialog ════ -->
  <div class="modal-overlay hidden" id="deleteConfirmOverlay">
    <div class="modal modal-sm delete-confirm-modal">
      <p class="delete-confirm-text" id="deleteConfirmText"></p>
      <div class="modal-footer">
        <button class="btn btn-cancel" id="deleteConfirmCancel">取消</button>
        <button class="btn detail-delete-confirm-btn" id="deleteConfirmBtn">确认删除</button>
      </div>
    </div>
  </div>

  <!-- ════ Person Detail Modal ════ -->
  <div class="modal-overlay hidden" id="personDetailOverlay">
    <div class="person-detail-panel">
      <button class="detail-back-btn hidden" id="personDetailBack" aria-label="返回">← 返回</button>
      <button class="detail-close" id="personDetailClose" aria-label="关闭影人详情">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div class="person-detail-content">
        <div class="person-header">
          <img id="personPhoto" class="person-photo" src="" alt="">
          <div class="person-info">
            <h1 id="personName" class="person-name"></h1>
            <div id="personRoles" class="person-roles hidden"></div>
            <p id="personMeta" class="person-meta"></p>
          </div>
        </div>
        <div class="person-bio-wrap">
          <p id="personBio" class="person-bio collapsed"></p>
          <div class="person-bio-fade hidden" id="personBioFade"></div>
          <button class="person-bio-toggle hidden" id="personBioToggle">展开 ↓</button>
        </div>
        <div id="personFilmography" class="person-filmography"></div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
